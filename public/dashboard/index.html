<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Boardwalk Newsletter Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts (Cursive + Print) -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Allura&family=Dancing+Script:wght@400;600&family=Parisienne&family=Pacifico&family=Satisfy&family=Tangerine:wght@400;700&family=Marck+Script&family=Homemade+Apple&family=Sacramento&family=Courgette&family=Alex+Brush&family=Bad+Script&family=Cookie&family=Yellowtail&family=Playfair+Display&family=Merriweather&family=Montserrat&family=Roboto&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="dashboard">

    <!-- =============================== -->
    <!-- LEFT PANEL (EDITOR) -->
    <!-- =============================== -->
    <aside class="panel-left">

      <h1 class="studio-title">Boardwalk Newsletter Studio</h1>

      <!-- Publish Button -->
      <div class="publish-box">
        <button id="publishBtn" class="btn-publish">🚀 Publish Newsletter</button>
        <p class="note">Builds & publishes the issue live.</p>
      </div>

      <hr>

      <!-- Date & Title -->
      <div class="field">
        <label>Date & Time</label>
        <input id="dateTime" type="text">
      </div>

      <div class="field">
        <label>Title</label>
        <input id="title" type="text" placeholder="Boardwalk Newsletter – Issue #1">
      </div>

      <!-- Paragraphs -->
      <div class="field">
        <label>Paragraph 1</label>
        <textarea id="p1"></textarea>
      </div>

      <div class="field">
        <label>Paragraph 2</label>
        <textarea id="p2"></textarea>
      </div>

      <!-- Dynamic Sections -->
      <h2>Sections</h2>
      <div id="sectionsContainer"></div>
      <button id="addSectionBtn" class="btn-add">+ Add Section</button>

      <!-- Ending -->
      <div class="field">
        <label>Ending / Sign-off</label>
        <textarea id="ending"></textarea>
      </div>

      <!-- Links -->
      <h2>Links</h2>
      <div id="linksContainer"></div>
      <button id="addLinkBtn" class="btn-add">+ Add Link</button>

      <!-- QR Codes -->
      <h2>QR Codes</h2>
      <div id="qrContainer"></div>
      <button id="addQrBtn" class="btn-add">+ Add QR</button>

      <!-- Video -->
      <h2>Video</h2>

      <div class="field">
        <label>Video Type</label>
        <select id="videoType">
          <option value="none">None</option>
          <option value="embed">Embed URL</option>
          <option value="upload">Upload Video File</option>
        </select>
      </div>

      <div class="field" id="videoUrlField" style="display:none;">
        <label>Video URL</label>
        <input id="videoUrl" type="text" placeholder="YouTube / Vimeo URL">
      </div>

      <div class="field" id="videoUploadField" style="display:none;">
        <label>Upload MP4</label>
        <input id="videoFile" type="file" accept="video/mp4">
      </div>

      <div class="field">
        <label>Video Placement</label>
        <select id="videoPlacement">
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
        </select>
      </div>

      <div class="field">
        <label>Video Caption</label>
        <input id="videoCaption" type="text">
      </div>

      <!-- Style -->
      <h2>Style</h2>

      <div class="field">
        <label>Font Family</label>
        <select id="fontFamily">
          <option value="Great Vibes">Great Vibes (Cursive)</option>
          <option value="Allura">Allura (Cursive)</option>
          <option value="Dancing Script">Dancing Script</option>
          <option value="Parisienne">Parisienne</option>
          <option value="Pacifico">Pacifico</option>
          <option value="Satisfy">Satisfy</option>
          <option value="Tangerine">Tangerine</option>
          <option value="Marck Script">Marck Script</option>
          <option value="Homemade Apple">Homemade Apple</option>
          <option value="Sacramento">Sacramento</option>
          <option value="Courgette">Courgette</option>
          <option value="Alex Brush">Alex Brush</option>
          <option value="Bad Script">Bad Script</option>
          <option value="Cookie">Cookie</option>
          <option value="Yellowtail">Yellowtail</option>

          <option value="Playfair Display">Playfair Display (Print)</option>
          <option value="Merriweather">Merriweather (Print)</option>
          <option value="Montserrat">Montserrat (Print)</option>
          <option value="Roboto">Roboto (Print)</option>
        </select>
      </div>

      <div class="field">
        <label>Paper Style</label>
        <select id="paperStyle">
          <option value="parchment1">Parchment 1</option>
          <option value="parchment2">Parchment 2</option>
          <option value="parchment3">Parchment 3</option>
          <option value="clean">Clean White</option>
        </select>
      </div>

      <div class="field">
        <label>Text Color</label>
        <input id="textColor" type="color" value="#2b1b0f">
      </div>

      <div class="field">
        <label>Text Background Color</label>
        <input id="textBgColor" type="color" value="#fdf5e6">
      </div>

      <div class="field checkbox">
        <label><input id="showLogo" type="checkbox" checked> Show Logo</label>
      </div>

      <div class="field checkbox">
        <label><input id="showSignature" type="checkbox" checked> Show Signature</label>
      </div>

    </aside>

    <!-- =============================== -->
    <!-- RIGHT PANEL (PREVIEW) -->
    <!-- =============================== -->
    <main class="panel-right">
      <h2>Live Preview</h2>

      <div id="preview" class="newsletter-preview">
        <!-- JS will render the newsletter here -->
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
