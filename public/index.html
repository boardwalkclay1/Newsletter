<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Boardwalk Newsletter Dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Load Google Fonts for cursive + print options -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Allura&family=Dancing+Script:wght@400;600&family=Parisienne&family=Playfair+Display&family=Roboto&family=Merriweather&family=Montserrat&family=Pacifico&family=Satisfy&family=Tangerine:wght@400;700&family=Marck+Script&family=Homemade+Apple&family=Sacramento&family=Courgette&family=Alex+Brush&family=Bad+Script&family=Cookie&family=Yellowtail&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bw-dashboard">

    <!-- LEFT PANEL -->
    <div class="bw-panel bw-panel-left">
      <h1>Boardwalk Newsletter</h1>

      <!-- GENERATE BUTTON -->
      <div class="bw-generate-box">
        <button id="generateBtn" class="bw-generate-btn">
          ⚡ Generate Newsletter Issue
        </button>
        <p class="bw-note">This will build the issue, update the index, and register delivery.</p>
      </div>

      <hr>

      <div class="bw-field">
        <label>Date & Time</label>
        <input id="dateTime" type="text">
      </div>

      <div class="bw-field">
        <label>Title</label>
        <input id="title" type="text" placeholder="Boardwalk Newsletter – Issue #1">
      </div>

      <div class="bw-field">
        <label>Paragraph 1</label>
        <textarea id="p1"></textarea>
      </div>

      <div class="bw-field">
        <label>Paragraph 2</label>
        <textarea id="p2"></textarea>
      </div>

      <div id="sectionsContainer"></div>
      <button id="addSectionBtn" type="button">+ Add Section</button>

      <div class="bw-field">
        <label>Ending Words / Sign-off</label>
        <textarea id="ending"></textarea>
      </div>

      <h2>Links</h2>
      <div id="linksContainer"></div>
      <button id="addLinkBtn" type="button">+ Add Link</button>

      <h2>QR Codes</h2>
      <div id="qrContainer"></div>
      <button id="addQrBtn" type="button">+ Add QR</button>

      <h2>Video</h2>
      <div class="bw-field">
        <label>Video Type</label>
        <select id="videoType">
          <option value="none">None</option>
          <option value="embed">Embed URL</option>
        </select>
      </div>

      <div class="bw-field" id="videoUrlField" style="display:none;">
        <label>Video URL (YouTube, Vimeo, etc.)</label>
        <input id="videoUrl" type="text">
      </div>

      <div class="bw-field">
        <label>Video Placement</label>
        <select id="videoPlacement">
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
        </select>
      </div>

      <div class="bw-field">
        <label>Video Caption</label>
        <input id="videoCaption" type="text">
      </div>

      <h2>Style</h2>

      <!-- FONT FAMILY SELECTOR -->
      <div class="bw-field">
        <label>Font Family</label>
        <select id="fontFamily">
          <option value="Great Vibes">Great Vibes (Cursive)</option>
          <option value="Allura">Allura (Cursive)</option>
          <option value="Dancing Script">Dancing Script (Cursive)</option>
          <option value="Parisienne">Parisienne (Cursive)</option>
          <option value="Pacifico">Pacifico (Cursive)</option>
          <option value="Satisfy">Satisfy (Cursive)</option>
          <option value="Tangerine">Tangerine (Cursive)</option>
          <option value="Marck Script">Marck Script (Cursive)</option>
          <option value="Homemade Apple">Homemade Apple (Cursive)</option>
          <option value="Sacramento">Sacramento (Cursive)</option>
          <option value="Courgette">Courgette (Cursive)</option>
          <option value="Alex Brush">Alex Brush (Cursive)</option>
          <option value="Bad Script">Bad Script (Cursive)</option>
          <option value="Cookie">Cookie (Cursive)</option>
          <option value="Yellowtail">Yellowtail (Cursive)</option>

          <option value="Playfair Display">Playfair Display (Print)</option>
          <option value="Merriweather">Merriweather (Print)</option>
          <option value="Montserrat">Montserrat (Print)</option>
          <option value="Roboto">Roboto (Print)</option>
        </select>
      </div>

      <div class="bw-field">
        <label>Theme</label>
        <select id="theme">
          <option value="old-scroll">Old Scroll</option>
          <option value="clean">Clean</option>
        </select>
      </div>

      <div class="bw-field">
        <label>Text Color</label>
        <input id="textColor" type="color" value="#2b1b0f">
      </div>

      <div class="bw-field">
        <label>Text Background Color</label>
        <input id="textBgColor" type="color" value="#fdf5e6">
      </div>

      <div class="bw-field">
        <label><input id="showLogo" type="checkbox" checked> Show Logo</label>
      </div>

      <div class="bw-field">
        <label><input id="showSignature" type="checkbox" checked> Show Signature</label>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="bw-panel bw-panel-right">
      <h2>Preview</h2>
      <div id="preview" class="boardwalk-newsletter theme-old-scroll font-old-english">
        <!-- JS fills this -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
