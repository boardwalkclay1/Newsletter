name: Build Newsletter

on:
  schedule:
    - cron: "0 16 * * 4"   # Thursday
    - cron: "0 16 * * 1"   # Monday
  workflow_dispatch:
  repository_dispatch:
    types: [build_newsletter]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      # ============================================================
      # SAVE DASHBOARD PAYLOAD (IF PROVIDED)
      # ============================================================
      - name: Save dashboard newsletter payload
        if: ${{ github.event.client_payload.newsletter }}
        run: |
          echo '${{ toJson(github.event.client_payload.newsletter) }}' > data/dashboard-newsletter.json
          echo "Dashboard newsletter JSON saved."

      # ============================================================
      # BUILD NEWSLETTER
      # ============================================================
      - name: Build newsletter
        run: node scripts/build-newsletter.js

      - name: Generate issue index
        run: node scripts/generate-issue-index.js

      - name: Register delivery job
        run: node scripts/register-delivery-job.js

      # ============================================================
      # COMMIT CHANGES
      # ============================================================
      - name: Commit issues and index
        run: |
          git config user.name "boardwalk-bot"
          git config user.email "bot@example.com"
          git add public/issues/ data/issues/index.json data/dashboard-newsletter.json data/delivery/
          git commit -m "Add newsletter issue" || echo "No changes"
          git push
