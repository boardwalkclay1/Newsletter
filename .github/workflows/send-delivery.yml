name: Send Delivery

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Send deliveries
        run: node scripts/send-deliveries.js
      - name: Commit delivery logs
        run: |
          git config user.name "boardwalk-bot"
          git config user.email "bot@example.com"
          git add data/delivery/logs.json
          git commit -m "Update delivery logs" || echo "No changes"
          git push
