name: Scrape Content

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Scrape BeltLine news
        run: node scripts/scrape-beltline-news.js
      - name: Scrape skating news
        run: node scripts/scrape-skate-news.js
      - name: Scrape national/global news
        run: |
          node scripts/scrape-national-news.js
          node scripts/scrape-global-news.js
      - name: Commit scraped data
        run: |
          git config user.name "boardwalk-bot"
          git config user.email "bot@example.com"
          git add data/scraped/
          git commit -m "Update scraped content" || echo "No changes"
          git push
