name: Dashboard Dispatch Router

on:
  repository_dispatch:

jobs:
  handle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Route event
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "Event type: $EVENT_TYPE"
          echo "Payload: $PAYLOAD"

          # ============================
          # SCRAPE CONTENT
          # ============================
          if [ "$EVENT_TYPE" = "scrape_content" ]; then
            echo "Running scrapers..."
            node scripts/scrape-beltline-news.js
            node scripts/scrape-skate-news.js
            node scripts/scrape-national-news.js
            node scripts/scrape-global-news.js
          fi

          # ============================
          # BUILD NEWSLETTER
          # ============================
          if [ "$EVENT_TYPE" = "build_newsletter" ]; then
            echo "Building newsletter..."
            node scripts/build-newsletter.js
            node scripts/generate-issue-index.js
            node scripts/register-delivery-job.js
          fi

          # ============================
          # SEND DELIVERY
          # ============================
          if [ "$EVENT_TYPE" = "send_delivery" ]; then
            echo "Sending deliveries..."
            node scripts/send-deliveries.js
          fi

          # ============================
          # ADD SUBSCRIBER
          # ============================
          if [ "$EVENT_TYPE" = "add_subscriber" ]; then
            echo "Adding subscriber..."
            echo "$PAYLOAD" | jq -r '.subscriber' | node backend/api/subscribe-cli.js
          fi

          # ============================
          # VERIFY SUBSCRIBER
          # ============================
          if [ "$EVENT_TYPE" = "verify_subscriber" ]; then
            echo "Verifying subscriber..."
            echo "$PAYLOAD" | jq -r '.token' | node backend/api/verify-subscriber.js
          fi

      - name: Commit changes
        run: |
          git config user.name "boardwalk-bot"
          git config user.email "bot@example.com"

          git add data/ public/issues/

          git commit -m "Dashboard-triggered update via repo_dispatch" || echo "No changes"
          git push
