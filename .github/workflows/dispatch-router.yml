name: Dashboard Dispatch Router

on:
  repository_dispatch:

jobs:
  handle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Route event
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "Event type: $EVENT_TYPE"
          echo "Payload: $PAYLOAD"

          # ============================
          # SCRAPE CONTENT
          # ============================
          if [ "$EVENT_TYPE" = "scrape_content" ]; then
            echo "Running scrapers..."
            node scripts/scrape-beltline-news.js
            node scripts/scrape-skate-news-global.js
            node scripts/scrape-skate-news-local.js
            node scripts/scrape-skate-news-national.js
            node scripts/scrape-bmx-news.js
            node scripts/scrape-inline-news.js
            node scripts/scrape-longboard-news.js
            node scripts/scrape-roller-news.js
            node scripts/scrape-snow-news.js
            node scripts/scrape-surf-news.js
          fi

          # ============================
          # BUILD NEWSLETTER
          # ============================
          if [ "$EVENT_TYPE" = "build_newsletter" ]; then
            echo "Building newsletter..."
            echo "$PAYLOAD" > public/data/dashboard-newsletter.json
            node scripts/aggregate-news.js
            node scripts/build-newsletter.js
          fi

          # ============================
          # SEND DELIVERY (OPTIONAL)
          # ============================
          if [ "$EVENT_TYPE" = "send_delivery" ]; then
            echo "Sending deliveries..."
            node scripts/send-deliveries.js
          fi

      - name: Commit changes
        run: |
          git config user.name "boardwalk-bot"
          git config user.email "bot@example.com"

          git add public/data/issues/ public/data/dashboard-newsletter.json

          git commit -m "Dashboard-triggered update via repo_dispatch" || echo "No changes"
          git push
